services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: merline-postgres
    environment:
      POSTGRES_DB: merline
      POSTGRES_USER: merline
      POSTGRES_PASSWORD: merline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merline"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - merline

  redis:
    image: redis:7-alpine
    container_name: merline-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - merline

  minio:
    image: minio/minio:latest
    container_name: merline-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - merline

  createbuckets:
    image: minio/mc:latest
    container_name: merline-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/merline-local --ignore-existing;
      mc anonymous set public local/merline-local;
      "
    networks:
      - merline

  mailpit:
    image: axllent/mailpit:latest
    container_name: merline-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8025/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - merline

  api:
    build:
      context: ../apps/backend-nestjs
      dockerfile: Dockerfile
      target: development
    image: merline-api:dev
    container_name: merline-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://merline:merline@postgres:5432/merline
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: merline-dev-secret
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: eu-west-1
      AWS_BUCKET: merline-local
      AWS_ENDPOINT: http://minio:9000
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ../apps/backend-nestjs/src:/app/src
      - ../apps/backend-nestjs/prisma:/app/prisma
      - ../apps/backend-nestjs/uploads:/app/uploads
    command: npm run start:dev
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - merline

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: development
    image: merline-frontend:dev
    container_name: merline-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - merline

  nginx:
    image: nginx:alpine
    container_name: merline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - merline

networks:
  merline:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
