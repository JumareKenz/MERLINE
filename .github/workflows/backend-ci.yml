name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend-nestjs/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'apps/backend-nestjs/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint & TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend-nestjs/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend-nestjs/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-nestjs
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: merline_test
          POSTGRES_USER: merline
          POSTGRES_PASSWORD: merline
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend-nestjs/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
        env:
          DATABASE_URL: postgresql://merline:merline@localhost:5432/merline_test
          JWT_SECRET: test-secret

  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=moderate
